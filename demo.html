<html>
<head>
	<script type="importmap">
	{
		"imports": {
			"p2p.js" : "https://esm.sh/p2p.js"
		}
	}
	</script>
</head>
<body>

<h3>Demo <a href="https://github.com/nuzulul/p2p.js">p2p.js</a></h3>
<ul id="myList" style="overflow:scroll;height:70%;"></ul>

<script type="module">
	import {createPeer} from 'p2p.js';
	
	const peers = [];
	
	const config = {
		appid: 'myAppTest'
	};		
	
	const peer = createPeer(config);
	
	peer.onPeerConnect((peer_id)=>{
		peers.push(peer_id);
		write(`connect : ${peer_id}`);
	});
	peer.onPeerDisconnect((peer_id)=>{
		peers.splice(peers.findIndex(item=>item===peer_id),1);
		write(`disconnect : ${peer_id}`);
	});
	peer.onPeerData((peer_id,data) => {
		write(`ondata : ${new TextDecoder().decode(data)}`);
	});
	
	setInterval(()=>{
		const me = peer.getPeerId();
		const msg = `i am ${me}`;
		peers.forEach(peer_id=>peer.sendPeerData(peer_id,msg));
		write(`broadcast : ${msg}`);
	},5000);
	
	const write = (input) => {
		const node = document.createElement("li")
		const textnode = document.createTextNode(input)
		node.appendChild(textnode)
		document.getElementById("myList").appendChild(node)
		var objDiv = document.getElementById("myList");
		objDiv.scrollTop = objDiv.scrollHeight;
	};
</script>
</body>
</html>
